info:
  name: Get My notifications
  type: http
  seq: 5

http:
  method: GET
  url: http://localhost:8080/notifications/my
  headers:
    - name: Authorization
      value: "{{token_type}} {{auth_token}}"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
