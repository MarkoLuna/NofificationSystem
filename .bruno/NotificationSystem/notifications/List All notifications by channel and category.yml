info:
  name: List All notifications by channel and category
  type: http
  seq: 6

http:
  method: GET
  url: http://localhost:8080/notifications?channel=EMAIL&category=MOVIES
  headers:
    - name: Authorization
      value: "{{token_type}} {{auth_token}}"
  params:
    - name: channel
      value: EMAIL
      type: query
    - name: category
      value: MOVIES
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
