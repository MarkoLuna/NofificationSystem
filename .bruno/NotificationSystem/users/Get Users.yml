info:
  name: Get Users
  type: http
  seq: 1

http:
  method: GET
  url: http://localhost:8084/users?channel=SMS&category=SPORTS
  headers:
    - name: Authorization
      value: "{{auth_type}} {{auth_token}}"
  params:
    - name: channel
      value: SMS
      type: query
    - name: category
      value: SPORTS
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
